<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Thai-inspired palette: gold #D4AF37, emerald #A8E6CF -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF"/>
      <stop offset="100%" style="stop-color:#8dd9bc"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Bold NTM initials in gold, clean sans-serif style -->
  <text x="16" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#D4AF37" text-anchor="middle">NTM</text>
</svg>
